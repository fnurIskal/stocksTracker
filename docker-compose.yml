services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P
            StrongPassword123! -Q 'SELECT 1' -No",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: stocksTracker/Dockerfile
    ports:
      - "7227:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=stocksTracker;User
        Id=sa;Password=StrongPassword123!;TrustServerCertificate=True
      - FinnhubSettings__ApiKey=YOUR_API_KEY # Replace with your Finnhub API key
      - FinnhubSettings__BaseUrl=https://finnhub.io/api/v1
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: DockerFile
    ports:
      - "5173:80"
    depends_on:
      - backend
